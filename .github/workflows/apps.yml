name: 'Apps - Build & Deploy'

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s-manifests/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: lab-it-support-lab-eks
  ECR_PREFIX: lab-it-support-lab
  FRONTEND_BUCKET_PREFIX: lab-it-support-lab-frontend

jobs:
  # ============================================================
  # JOB 1: build + scan + push de los 3 microservicios
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [tickets-api, files-api, metrics-api]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          cd app/${{ matrix.service }}
          docker build -t ${{ matrix.service }}:${{ github.sha }} .

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Tag & Push to ECR
        run: |
          REPO=${{ steps.ecr.outputs.registry }}/${{ env.ECR_PREFIX }}/${{ matrix.service }}
          docker tag ${{ matrix.service }}:${{ github.sha }} $REPO:${{ github.sha }}
          docker tag ${{ matrix.service }}:${{ github.sha }} $REPO:latest
          docker push $REPO:${{ github.sha }}
          docker push $REPO:latest

  # ============================================================
  # JOB 2: aplicar manifests K8s + rollout
  # ============================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      # Aplica manifests solo si cambiaron (idempotente)
      - name: Aplicar manifests K8s
        run: |
          kubectl apply -f k8s-manifests/ || echo "Algunos manifests requieren valores reales (REEMPLAZAR_*)"

      - name: Rollout restart (toma la imagen :latest nueva)
        run: |
          kubectl rollout restart deployment/tickets-api -n default
          kubectl rollout restart deployment/files-api -n default
          kubectl rollout restart deployment/metrics-api -n default
          kubectl rollout status deployment/tickets-api -n default --timeout=180s
          kubectl rollout status deployment/files-api -n default --timeout=180s
          kubectl rollout status deployment/metrics-api -n default --timeout=180s

  # ============================================================
  # JOB 3: subir frontend a S3 + invalidar CloudFront
  # ============================================================
  deploy-frontend:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Subir frontend a S3 e invalidar CloudFront
        run: |
          BUCKET=$(aws s3 ls | grep "${{ env.FRONTEND_BUCKET_PREFIX }}" | awk '{print $3}' | head -1)
          if [ -z "$BUCKET" ]; then
            echo "No se encontro el bucket frontend, saltando."
            exit 0
          fi
          echo "Subiendo a s3://$BUCKET"
          aws s3 cp app/frontend/index.html "s3://$BUCKET/index.html" --content-type "text/html"

          DIST=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment!=null]|[?contains(Comment,'lab-it-support')].Id" --output text | head -1)
          if [ -n "$DIST" ]; then
            echo "Invalidando CloudFront $DIST"
            aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"
          fi
