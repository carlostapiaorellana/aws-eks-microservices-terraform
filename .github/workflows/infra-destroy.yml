name: 'Infra - Destroy'

on:
  workflow_dispatch:
    inputs:
      confirmar:
        description: 'Escribe DESTRUIR para confirmar'
        required: true
        type: string
      motivo:
        description: 'Motivo (queda en el log)'
        required: false
        default: 'Fin de lab'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: lab-it-support-lab-eks
  ECR_PREFIX: lab-it-support-lab

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar confirmacion
        run: |
          if [ "${{ github.event.inputs.confirmar }}" != "DESTRUIR" ]; then
            echo "Confirmacion incorrecta. Debes escribir exactamente: DESTRUIR"
            exit 1
          fi
          echo "Confirmacion valida."

  destroy:
    needs: validar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Terraform Init
        run: terraform init

      # ---- PASO 1: borrar el Ingress para liberar el ALB ----
      # El ALB lo crea el LB Controller (no Terraform). Si no se borra,
      # bloquea la eliminacion de subnets e IGW.
      - name: Eliminar Ingress (libera el ALB)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.CLUSTER_NAME }} 2>/dev/null && \
          kubectl delete ingress it-support-ingress -n default --ignore-not-found=true --timeout=60s || \
          echo "Cluster no accesible o Ingress ya no existe, continuando..."
          echo "Esperando 90s a que el ALB se elimine..."
          sleep 90

      # ---- PASO 2: borrar ALBs huerfanos por si el Ingress ya no existia ----
      - name: Limpiar ALBs huerfanos del lab
        run: |
          for arn in $(aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} --query "LoadBalancers[?contains(LoadBalancerName,'k8s-default')].LoadBalancerArn" --output text); do
            echo "Borrando ALB huerfano: $arn"
            aws elbv2 delete-load-balancer --load-balancer-arn "$arn" --region ${{ env.AWS_REGION }} || true
          done
          sleep 30

      # ---- PASO 3: borrar target groups huerfanos ----
      - name: Limpiar target groups huerfanos
        run: |
          for arn in $(aws elbv2 describe-target-groups --region ${{ env.AWS_REGION }} --query "TargetGroups[?starts_with(TargetGroupName,'k8s-default')].TargetGroupArn" --output text); do
            echo "Borrando target group: $arn"
            aws elbv2 delete-target-group --target-group-arn "$arn" --region ${{ env.AWS_REGION }} || true
          done

      # ---- PASO 4: vaciar repos ECR (no se pueden destruir con imagenes) ----
      - name: Vaciar repos ECR
        run: |
          for repo in tickets-api files-api metrics-api; do
            echo "Vaciando ECR: ${{ env.ECR_PREFIX }}/$repo"
            IMAGES=$(aws ecr list-images --repository-name "${{ env.ECR_PREFIX }}/$repo" --region ${{ env.AWS_REGION }} --query 'imageIds' --output json 2>/dev/null || echo "[]")
            if [ "$IMAGES" != "[]" ]; then
              aws ecr batch-delete-image --repository-name "${{ env.ECR_PREFIX }}/$repo" --region ${{ env.AWS_REGION }} --image-ids "$IMAGES" || true
            fi
          done

      # ---- PASO 5: destroy ----
      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # ---- PASO 6: limpiar ENIs huerfanas si la VPC no se borro ----
      - name: Limpiar ENIs huerfanas
        run: |
          VPC=$(aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} --filters "Name=tag:Project,Values=lab-it-support" --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "None")
          if [ "$VPC" != "None" ] && [ "$VPC" != "" ]; then
            echo "VPC $VPC aun existe, limpiando ENIs..."
            for eni in $(aws ec2 describe-network-interfaces --region ${{ env.AWS_REGION }} --filters "Name=vpc-id,Values=$VPC" "Name=status,Values=available" --query "NetworkInterfaces[*].NetworkInterfaceId" --output text); do
              aws ec2 delete-network-interface --network-interface-id "$eni" --region ${{ env.AWS_REGION }} || true
            done
            echo "Reintentando destroy..."
            terraform destroy -auto-approve || echo "Revisar manualmente la VPC $VPC"
          else
            echo "VPC eliminada correctamente."
          fi

      # ---- PASO 7: verificacion final ----
      - name: Verificar que no quedan recursos
        run: |
          echo "=== EKS ==="; aws eks list-clusters --region ${{ env.AWS_REGION }} --output text || true
          echo "=== RDS ==="; aws rds describe-db-instances --region ${{ env.AWS_REGION }} --query "DBInstances[?contains(DBInstanceIdentifier,'lab-it-support')].DBInstanceIdentifier" --output text || true
          echo "=== VPC ==="; aws ec2 describe-vpcs --region ${{ env.AWS_REGION }} --filters "Name=tag:Project,Values=lab-it-support" --query "Vpcs[*].VpcId" --output text || true
          echo "=== ALBs ==="; aws elbv2 describe-load-balancers --region ${{ env.AWS_REGION }} --query "LoadBalancers[?contains(LoadBalancerName,'k8s-default')].LoadBalancerName" --output text || true
          echo ""
          echo "Destroy completado. Motivo: ${{ github.event.inputs.motivo }} | Por: ${{ github.actor }}"
          echo "NOTA: el bucket de state y el rol github-actions-bootstrap NO se destruyen."
